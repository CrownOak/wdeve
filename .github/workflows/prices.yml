name: prices
# Refresh the landing page ticker + buyback board with live Jita prices (compressed blocks)
# for the most popular minable of each type. Commits index.html back to this repo if it changed.
on:
  schedule:
    - cron: '5 * * * *'       # hourly, :05 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # to dispatch the pages deploy after committing

concurrency:
  group: run-${{ github.repository }}-prices
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Refresh prices
        run: python scripts/price_index.py
      - name: Commit if changed
        run: |
          git config user.name  "eve-ops-bot"
          git config user.email "eve-ops-bot@users.noreply.github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "prices: refresh landing buyback board $(date -u +%FT%TZ)"
            for i in 1 2 3 4 5; do git push && break || { git pull --rebase; sleep $((RANDOM % 4 + 2)); }; done
            # GITHUB_TOKEN pushes don't fire on:push workflows, so deploy explicitly
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
