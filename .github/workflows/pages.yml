name: pages
# Deploy the site to GitHub Pages. Replaces the legacy branch-deploy pipeline,
# which 400'd when hourly generator pushes landed close together. The
# cancel-in-progress concurrency group ensures only the newest push deploys.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      # Pages backend occasionally flakes mid-sync ("Deployment failed, try
      # again later") — one spaced retry absorbs it
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
